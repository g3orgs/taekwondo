    <circle class="head" cx="857" cy="287" r="16"/>
    <text class="person-label" x="857" y="320">V</text>
    <line class="limb" x1="836" y1="314" x2="823" y2="289"/>
    <line class="limb" x1="878" y1="314" x2="891" y2="289"/>
    <g id="sequence-3-phase-2-defender-foot-l"><rect class="foot" x="814" y="263" width="26" height="44" rx="13"/><text class="side" x="827" y="285">L</text></g><g id="sequence-3-phase-2-defender-foot-r"><rect class="foot" x="874" y="333" width="26" height="44" rx="13"/><text class="side" x="887" y="355">R</text></g>
  </g>
    <g id="sequence-3-phase-2-action-1" class="action action-punch"><path class="active-blue" d="M 879 313 L 895 195"/><path class="motion-blue" d="M 879 313 L 895 195"/></g><text class="caption" x="635" y="401">Rechte Faust zum Oberkörper</text>
  </g>
<g id="sequence-3-phase-3" class="phase">
    <rect class="panel" x="25" y="455" width="560" height="340" rx="14"/>
    <text class="panel-title" x="45" y="488">3 · Ap Chagi links</text>
    <g id="sequence-3-phase-3-attacker" class="person attacker">
    <ellipse class="torso" cx="305" cy="555" rx="34" ry="23"/>
    <circle class="head" cx="305" cy="588" r="16"/>
    <text class="person-label" x="305" y="555">A</text>
    <line class="limb" x1="284" y1="561" x2="271" y2="586"/>
    <line class="limb" x1="326" y1="561" x2="339" y2="586"/>
    <g id="sequence-3-phase-3-attacker-foot-l"><rect class="foot" x="322" y="498" width="26" height="44" rx="13"/><text class="side" x="335" y="520">L</text></g><g id="sequence-3-phase-3-attacker-foot-r"><rect class="foot" x="262" y="568" width="26" height="44" rx="13"/><text class="side" x="275" y="590">R</text></g>
  </g>
    <g id="sequence-3-phase-3-defender" class="person defender">
    <ellipse class="torso" cx="275" cy="672" rx="34" ry="23"/>
    <circle class="head" cx="275" cy="639" r="16"/>
    <text class="person-label" x="275" y="672">V</text>
    <line class="limb" x1="254" y1="666" x2="241" y2="641"/>
    <line class="limb" x1="296" y1="666" x2="309" y2="641"/>
    <g id="sequence-3-phase-3-defender-foot-l" class="ghost"><rect class="foot" x="232" y="615" width="26" height="44" rx="13"/><text class="side" x="245" y="637">L</text></g><g id="sequence-3-phase-3-defender-foot-r"><rect class="foot" x="292" y="685" width="26" height="44" rx="13"/><text class="side" x="305" y="707">R</text></g>
  </g>
    <g id="sequence-3-phase-3-action-1" class="action action-kick">
      <path class="motion-blue" d="M 245 637 L 305 555"/>
      <rect class="active-foot-blue" x="292" y="534" width="26" height="42" rx="13"/>
      <text class="side" x="305" y="555">L</text>
    </g><text class="caption" x="45" y="761">Linker Vorwärtstritt</text>
  </g>
<g id="sequence-3-phase-4" class="phase">
    <rect class="panel" x="615" y="455" width="560" height="340" rx="14"/>
    <text class="panel-title" x="635" y="488">4 · Paltung Chagi rechts</text>
    <g id="sequence-3-phase-4-attacker" class="person attacker">
    <ellipse class="torso" cx="895" cy="555" rx="34" ry="23"/>
    <circle class="head" cx="895" cy="588" r="16"/>
    <text class="person-label" x="895" y="555">A</text>
    <line class="limb" x1="874" y1="561" x2="861" y2="586"/>
    <line class="limb" x1="916" y1="561" x2="929" y2="586"/>
    <g id="sequence-3-phase-4-attacker-foot-l"><rect class="foot" x="912" y="498" width="26" height="44" rx="13"/><text class="side" x="925" y="520">L</text></g><g id="sequence-3-phase-4-attacker-foot-r"><rect class="foot" x="852" y="568" width="26" height="44" rx="13"/><text class="side" x="865" y="590">R</text></g>
  </g>
    <g id="sequence-3-phase-4-defender" class="person defender">
    <ellipse class="torso" cx="877" cy="668" rx="34" ry="23"/>
    <circle class="head" cx="877" cy="635" r="16"/>
    <text class="person-label" x="877" y="668">V</text>
    <line class="limb" x1="856" y1="662" x2="843" y2="637"/>
    <line class="limb" x1="898" y1="662" x2="911" y2="637"/>
    <g id="sequence-3-phase-4-defender-foot-l"><rect class="foot" x="834" y="681" width="26" height="44" rx="13"/><text class="side" x="847" y="703">L</text></g><g id="sequence-3-phase-4-defender-foot-r" class="ghost"><rect class="foot" x="894" y="611" width="26" height="44" rx="13"/><text class="side" x="907" y="633">R</text></g>
  </g>
    <g id="sequence-3-phase-4-action-1" class="action action-roundkick">
      <path class="motion-blue" d="M 907 633 Q 919 611.5 895 555"/>
      <rect class="active-foot-blue" x="882" y="534" width="26" height="42" rx="13"/>
      <text class="side" x="895" y="555">R</text>
    </g><text class="caption" x="635" y="761">Rechter Rundtritt zum Oberkörper</text>
  </g>
</svg>
