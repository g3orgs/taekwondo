<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 920" role="img" aria-labelledby="title desc">
  <title id="title">Sequenz 1 mit linkem Rückschritt als Draufsicht</title>
  <desc id="desc">Vier Phasen zeigen den Angriff, den alleinigen Rückschritt des linken Verteidigerfußes mit linker Abwehr und gleichzeitigem rechten Fauststoß, den linken Kopffauststoß und den rechten Vorwärtstritt.</desc>

  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#a62028"/>
    </marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#1769aa"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0 0L10 5L0 10z" fill="#69737d"/>
    </marker>

    <g id="attacker-ap-gubi" class="person attacker">
      <ellipse class="torso" cx="0" cy="0" rx="35" ry="24"/>
      <circle class="head" cx="0" cy="34" r="17"/>
      <text class="person-label" x="0" y="0">A</text>
      <line class="limb" x1="-21" y1="7" x2="-34" y2="32"/>
      <line class="limb" x1="21" y1="7" x2="34" y2="32"/>
      <g class="foot-left"><rect class="foot" x="17" y="-79" width="27" height="48" rx="13"/><text class="side" x="30.5" y="-55">L</text></g>
      <g class="foot-right"><rect class="foot" x="-43" y="41" width="27" height="48" rx="13"/><text class="side" x="-29.5" y="65">R</text></g>
    </g>

    <g id="defender-neutral" class="person defender">
      <ellipse class="torso" cx="0" cy="0" rx="35" ry="24"/>
      <circle class="head" cx="0" cy="-34" r="17"/>
      <text class="person-label" x="0" y="0">V</text>
      <line class="limb" x1="-21" y1="-7" x2="-34" y2="-32"/>
      <line class="limb" x1="21" y1="-7" x2="34" y2="-32"/>
      <g class="foot-left"><rect class="foot" x="-43" y="21" width="27" height="48" rx="13"/><text class="side" x="-29.5" y="45">L</text></g>
      <g class="foot-right"><rect class="foot" x="17" y="21" width="27" height="48" rx="13"/><text class="side" x="30.5" y="45">R</text></g>
    </g>

    <g id="defender-left-back" class="person defender">
      <ellipse class="torso" cx="0" cy="0" rx="35" ry="24"/>
      <circle class="head" cx="0" cy="-34" r="17"/>
      <text class="person-label" x="0" y="0">V</text>
      <line class="limb" x1="-21" y1="-7" x2="-34" y2="-32"/>
      <line class="limb" x1="21" y1="-7" x2="34" y2="-32"/>
      <g class="foot-left"><rect class="foot" x="-43" y="56" width="27" height="48" rx="13"/><text class="side" x="-29.5" y="80">L</text></g>
      <g class="foot-right"><rect class="foot" x="17" y="6" width="27" height="48" rx="13"/><text class="side" x="30.5" y="30">R</text></g>
    </g>

    <style>
      .panel{fill:#fff;stroke:#d8d2c9;stroke-width:2}.panel-title{fill:#17202a;font:700 21px system-ui,sans-serif}.caption{fill:#4f5a65;font:16px system-ui,sans-serif}.legend{fill:#17202a;font:17px system-ui,sans-serif}.stance-label{fill:#34404b;font:700 13px system-ui,sans-serif;text-anchor:end}.torso,.head{stroke-width:3}.attacker .torso,.attacker .head{fill:#f8d9dc;stroke:#a62028}.defender .torso,.defender .head{fill:#dbeeff;stroke:#1769aa}.limb{fill:none;stroke:#69737d;stroke-linecap:round;stroke-width:7}.active-red,.active-blue{fill:none;stroke-linecap:round;stroke-width:9}.active-red{stroke:#a62028}.active-blue{stroke:#1769aa}.foot{stroke-width:2}.attacker .foot{fill:#fff4f4;stroke:#a62028}.defender .foot{fill:#f1f8ff;stroke:#1769aa}.active-foot{fill:#f1f8ff;stroke:#1769aa;stroke-width:3}.side,.person-label{fill:#17202a;font:700 14px system-ui,sans-serif;text-anchor:middle;dominant-baseline:middle}.motion-red,.motion-blue,.motion-gray{fill:none;stroke-width:4;stroke-dasharray:8 6}.motion-red{stroke:#a62028;marker-end:url(#arrow-red)}.motion-blue{stroke:#1769aa;marker-end:url(#arrow-blue)}.motion-gray{stroke:#69737d;stroke-width:3;marker-end:url(#arrow-gray)}.ghost{opacity:.25}.fixed-ring{fill:none;stroke:#69737d;stroke-width:2}.fixed-label{fill:#4f5a65;font:700 13px system-ui,sans-serif}
    </style>
  </defs>

  <rect width="1200" height="920" fill="#f4f1eb"/>
  <text x="35" y="38" fill="#17202a" font-family="system-ui, sans-serif" font-size="27" font-weight="750">Sequenz 1 · Linker Rückschritt mit Abwehr und Konter</text>
  <g id="legend" transform="translate(35 58)">
    <circle cx="10" cy="10" r="9" fill="#f8d9dc" stroke="#a62028" stroke-width="2"/><text class="legend" x="28" y="16">Angreifer</text>
    <circle cx="145" cy="10" r="9" fill="#dbeeff" stroke="#1769aa" stroke-width="2"/><text class="legend" x="163" y="16">Verteidiger</text>
    <text class="legend" x="310" y="16">R/L = eigene Seite · Draufsicht · nur der mit Pfeil markierte Fuß bewegt sich</text>
  </g>

  <g id="phase-1" class="phase">
    <rect class="panel" x="25" y="95" width="560" height="390" rx="14"/>
    <text class="panel-title" x="45" y="128">1 · Angriff zur Körpermitte</text>
    <text class="caption" x="45" y="158">Momtong Jireugi rechts</text>
    <use href="#attacker-ap-gubi" x="305" y="220"/>
    <use href="#defender-neutral" x="305" y="360"/>
    <path class="active-red" d="M284 227L305 350"/>
    <path class="motion-red" d="M288 250L304 344"/>
    <text class="stance-label" x="565" y="224">A · Ap Gubi · R vor</text>
    <text class="stance-label" x="565" y="364">V · Naranhi Seogi · Ausgang</text>
  </g>

  <g id="phase-2" class="phase">
    <rect class="panel" x="615" y="95" width="560" height="390" rx="14"/>
    <text class="panel-title" x="635" y="128">2 · Abwehr + Folgetechnik 1</text>
    <text class="caption" x="635" y="158">L zurück · Momtong An Makki L + Momtong Jireugi R gleichzeitig</text>
    <use href="#attacker-ap-gubi" x="895" y="220"/>
    <use href="#defender-left-back" x="895" y="375"/>
    <g class="person defender ghost"><rect class="foot" x="852" y="381" width="27" height="48" rx="13"/><text class="side" x="865.5" y="405">L</text></g>
    <path class="motion-gray" d="M865 405L865 450"/>
    <circle class="fixed-ring" cx="925.5" cy="405" r="20"/>
    <text class="fixed-label" x="950" y="410">R bleibt</text>
    <path class="active-blue" d="M916 368L895 245"/>
    <path class="active-blue" d="M874 368Q875 338 890 350"/>
    <path class="motion-blue" d="M913 348L897 251"/>
    <text class="stance-label" x="1155" y="224">A · Ap Gubi · R vor</text>
    <text class="stance-label" x="1155" y="379">V · Ap Gubi · L zurück</text>
  </g>

  <g id="phase-3" class="phase">
    <rect class="panel" x="25" y="505" width="560" height="390" rx="14"/>
    <text class="panel-title" x="45" y="538">3 · Folgetechnik 2: Eolgul Jireugi L</text>
    <text class="caption" x="45" y="568">Linke Faust zum Kopf · Fußstellung bleibt unverändert</text>
    <use href="#attacker-ap-gubi" x="305" y="630"/>
    <use href="#defender-left-back" x="305" y="785"/>
    <path class="active-blue" d="M284 778L305 665"/>
    <path class="motion-blue" d="M287 754L303 671"/>
    <circle class="fixed-ring" cx="335.5" cy="815" r="20"/>
    <text class="fixed-label" x="360" y="820">R bleibt</text>
    <text class="stance-label" x="565" y="634">A · Ap Gubi · R vor</text>
    <text class="stance-label" x="565" y="789">V · Ap Gubi · L zurück</text>
  </g>

  <g id="phase-4" class="phase">
    <rect class="panel" x="615" y="505" width="560" height="390" rx="14"/>
    <text class="panel-title" x="635" y="538">4 · Folgetechnik 3: Ap Chagi R</text>
    <text class="caption" x="635" y="568">Linker Fuß ist Standbein · rechter Fuß tritt zum Oberkörper</text>
    <use href="#attacker-ap-gubi" x="895" y="630"/>
    <use href="#defender-left-back" x="895" y="785"/>
    <g class="person defender ghost"><rect class="foot" x="912" y="791" width="27" height="48" rx="13"/><text class="side" x="925.5" y="815">R</text></g>
    <path class="motion-blue" d="M925 815Q950 715 895 650"/>
    <rect class="active-foot" x="882" y="629" width="27" height="48" rx="13"/>
    <text class="side" x="895.5" y="653">R</text>
    <circle class="fixed-ring" cx="865.5" cy="865" r="20"/>
    <text class="fixed-label" x="890" y="870">L bleibt / Standbein</text>
    <text class="stance-label" x="1155" y="634">A · Ap Gubi · R vor</text>
    <text class="stance-label" x="1155" y="789">V · Standbein L · Tritt R</text>
  </g>
</svg>
