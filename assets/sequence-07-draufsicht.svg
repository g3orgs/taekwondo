    <g id="sequence-7-phase-1-movement" class="movement"><path class="motion-gray" d="M 275 320 L 275 355"/><text class="move-label" x="567" y="152" text-anchor="end">L zurück</text></g><g id="sequence-7-phase-1-action-1" class="action action-punch"><path class="active-red" d="M 283 202 L 305 320"/><path class="motion-red" d="M 283 202 L 305 320"/></g><g id="sequence-7-phase-1-action-2" class="action action-block"><path class="active-blue" d="M 327 315 Q 305 290 310 265"/></g><g id="sequence-7-phase-1-stances" class="stance-labels">
