<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" role="img" aria-labelledby="title desc">
  <title id="title">Sequenz 4: Kreuzblock und Dwit Chagi als Draufsicht</title>
  <desc id="desc">Die Phasen zeigen Angreifer und Verteidiger von oben. R und L bezeichnen immer die eigene Seite der dargestellten Person.</desc>
  <defs>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#a62028"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#1769aa"/></marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M0 0L10 5L0 10z" fill="#69737d"/></marker>
    <style>
      .panel{fill:#fff;stroke:#d8d2c9;stroke-width:2}.panel-title{fill:#17202a;font:700 21px system-ui,sans-serif}.panel-title.compact{font-size:18px}.caption{fill:#4f5a65;font:15px system-ui,sans-serif}.legend,.move-label{fill:#17202a;font:16px system-ui,sans-serif}.move-label{font-size:14px;font-weight:650}.torso,.head{stroke-width:3}.attacker .torso,.attacker .head{fill:#f8d9dc;stroke:#a62028}.defender .torso,.defender .head{fill:#dbeeff;stroke:#1769aa}.limb{fill:none;stroke:#69737d;stroke-linecap:round;stroke-width:7}.active-red,.active-blue{fill:none;stroke-linecap:round;stroke-width:9}.active-red{stroke:#a62028}.active-blue{stroke:#1769aa}.foot{stroke-width:2}.attacker .foot{fill:#fff4f4;stroke:#a62028}.defender .foot{fill:#f1f8ff;stroke:#1769aa}.active-foot-red{fill:#fff4f4;stroke:#a62028;stroke-width:3}.active-foot-blue{fill:#f1f8ff;stroke:#1769aa;stroke-width:3}.ghost{opacity:.25}.side,.person-label{fill:#17202a;font:700 14px system-ui,sans-serif;text-anchor:middle;dominant-baseline:middle}.motion-red,.motion-blue,.motion-gray,.rotation{fill:none;stroke-width:4;stroke-dasharray:8 6}.motion-red{stroke:#a62028;marker-end:url(#arrow-red)}.motion-blue{stroke:#1769aa;marker-end:url(#arrow-blue)}.motion-gray{stroke:#69737d;stroke-width:3;marker-end:url(#arrow-gray)}.rotation{stroke:#1769aa;marker-end:url(#arrow-blue)}
    </style>
  </defs>
  <rect width="1200" height="820" fill="#f4f1eb"/>
  <text x="35" y="38" fill="#17202a" font-family="system-ui, sans-serif" font-size="27" font-weight="750">Sequenz 4 · Kreuzblock und Dwit Chagi</text>
  <g id="sequence-4-legend" transform="translate(35 58)">
    <circle cx="10" cy="10" r="9" fill="#f8d9dc" stroke="#a62028" stroke-width="2"/><text class="legend" x="28" y="16">Angreifer</text>
    <circle cx="145" cy="10" r="9" fill="#dbeeff" stroke="#1769aa" stroke-width="2"/><text class="legend" x="163" y="16">Verteidiger</text>
    <text class="legend" x="310" y="16">R/L = eigene Seite · Blickrichtung jeweils zum Partner · schematische Draufsicht</text>
  </g>
  <g id="sequence-4-phase-1" class="phase">
    <rect class="panel" x="25" y="95" width="560" height="340" rx="14"/>
    <text class="panel-title" x="45" y="128">1 · Angriff und Abwehr</text>
    <g id="sequence-4-phase-1-attacker" class="person attacker">
