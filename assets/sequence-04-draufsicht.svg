  </g>
    <g id="sequence-4-phase-1-movement" class="movement"><path class="motion-gray" d="M 335 320 L 335 355"/><text class="move-label" x="567" y="152" text-anchor="end">R zurück</text></g><g id="sequence-4-phase-1-action-1" class="action action-kick">
