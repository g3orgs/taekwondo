    <line class="limb" x1="284" y1="561" x2="271" y2="586"/>
    <line class="limb" x1="326" y1="561" x2="339" y2="586"/>
    <g id="sequence-4-phase-3-attacker-foot-l"><rect class="foot" x="322" y="498" width="26" height="44" rx="13"/><text class="side" x="335" y="520">L</text></g><g id="sequence-4-phase-3-attacker-foot-r"><rect class="foot" x="262" y="568" width="26" height="44" rx="13"/><text class="side" x="275" y="590">R</text></g>
  </g>
    <g id="sequence-4-phase-3-defender" class="person defender">
