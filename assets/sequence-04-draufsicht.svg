      <text class="side" x="895" y="195">R</text>
    </g><text class="caption" x="635" y="401">Rechter Vorwärtstritt zum Oberkörper</text>
  </g>
<g id="sequence-4-phase-3" class="phase">
    <rect class="panel" x="25" y="455" width="560" height="340" rx="14"/>
    <text class="panel-title" x="45" y="488">3 · Momtong Jireugi links</text>
    <g id="sequence-4-phase-3-attacker" class="person attacker">
