  </g>
    <g id="sequence-4-phase-4-defender" class="person defender">
    <ellipse class="torso" cx="895" cy="672" rx="34" ry="23"/>
    <circle class="head" cx="895" cy="639" r="16"/>
    <text class="person-label" x="895" y="672">V</text>
    <line class="limb" x1="874" y1="666" x2="861" y2="641"/>
    <line class="limb" x1="916" y1="666" x2="929" y2="641"/>
    <g id="sequence-4-phase-4-defender-foot-l"><rect class="foot" x="852" y="685" width="26" height="44" rx="13"/><text class="side" x="865" y="707">L</text></g><g id="sequence-4-phase-4-defender-foot-r" class="ghost"><rect class="foot" x="912" y="615" width="26" height="44" rx="13"/><text class="side" x="925" y="637">R</text></g>
