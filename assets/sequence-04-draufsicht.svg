  </g>
    <g id="sequence-4-phase-3-movement" class="movement"><path class="motion-gray" d="M 335 705 L 335 635"/><text class="move-label" x="567" y="512" text-anchor="end">R absetzen</text></g><g id="sequence-4-phase-3-action-1" class="action action-punch"><path class="active-blue" d="M 283 663 L 305 555"/><path class="motion-blue" d="M 283 663 L 305 555"/></g><text class="caption" x="45" y="761">Rechts vorn absetzen · linke Faust</text>
  </g>
