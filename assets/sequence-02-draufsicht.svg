  </g>
    <g id="sequence-2-phase-4-defender" class="person defender">
    <ellipse class="torso" cx="885" cy="685" rx="34" ry="23"/>
    <circle class="head" cx="885" cy="652" r="16"/>
    <text class="person-label" x="885" y="685">V</text>
    <line class="limb" x1="864" y1="679" x2="851" y2="654"/>
    <line class="limb" x1="906" y1="679" x2="919" y2="654"/>
    <g id="sequence-2-phase-4-defender-foot-l"><rect class="foot" x="842" y="698" width="26" height="44" rx="13"/><text class="side" x="855" y="720">L</text></g><g id="sequence-2-phase-4-defender-foot-r" class="ghost"><rect class="foot" x="902" y="628" width="26" height="44" rx="13"/><text class="side" x="915" y="650">R</text></g>
  </g>
    <g id="sequence-2-phase-4-movement" class="movement"><path class="motion-gray" d="M 885 675 L 885 733"/><text class="move-label" x="1157" y="512" text-anchor="end">Ausstieg</text></g><g id="sequence-2-phase-4-action-1" class="action action-sidekick">
