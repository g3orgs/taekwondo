    <circle class="head" cx="305" cy="228" r="16"/>
    <text class="person-label" x="305" y="195">A</text>
    <line class="limb" x1="284" y1="201" x2="271" y2="226"/>
    <line class="limb" x1="326" y1="201" x2="339" y2="226"/>
    <g id="sequence-2-phase-1-attacker-foot-l"><rect class="foot" x="322" y="138" width="26" height="44" rx="13"/><text class="side" x="335" y="160">L</text></g><g id="sequence-2-phase-1-attacker-foot-r"><rect class="foot" x="262" y="208" width="26" height="44" rx="13"/><text class="side" x="275" y="230">R</text></g>
  </g>
    <g id="sequence-2-phase-1-defender" class="person defender">
