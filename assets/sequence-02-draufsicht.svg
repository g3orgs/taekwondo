  </g>
    <g id="sequence-2-phase-2-action-1" class="action action-backfist"><path class="active-blue" d="M 879 313 Q 882 274 895 228"/><path class="motion-blue" d="M 879 313 L 895 228"/></g><text class="caption" x="635" y="401">Rechter Handrückenschlag zum Kopf</text>
  </g>
<g id="sequence-2-phase-3" class="phase">
