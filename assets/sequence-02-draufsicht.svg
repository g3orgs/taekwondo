    <circle class="head" cx="281" cy="627" r="16"/>
    <text class="person-label" x="281" y="660">V</text>
    <line class="limb" x1="260" y1="654" x2="247" y2="629"/>
    <line class="limb" x1="302" y1="654" x2="315" y2="629"/>
    <g id="sequence-2-phase-3-defender-foot-l"><rect class="foot" x="238" y="673" width="26" height="44" rx="13"/><text class="side" x="251" y="695">L</text></g><g id="sequence-2-phase-3-defender-foot-r"><rect class="foot" x="298" y="603" width="26" height="44" rx="13"/><text class="side" x="311" y="625">R</text></g>
  </g>
    <g id="sequence-2-phase-3-movement" class="movement"><path class="motion-gray" d="M 311 695 L 311 625"/><text class="move-label" x="567" y="512" text-anchor="end">R heran</text></g><g id="sequence-2-phase-3-action-1" class="action action-elbow"><path class="active-blue" d="M 303 653 Q 306 629.55 294.92 599.1"/><path class="motion-blue" d="M 303 653 L 294.92 599.1"/></g><text class="caption" x="45" y="761">Rechts herantreten · rechter Ellenbogen zum Oberkörper</text>
  </g>
<g id="sequence-2-phase-4" class="phase">
