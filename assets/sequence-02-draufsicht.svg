  <rect width="1200" height="820" fill="#f4f1eb"/>
  <text x="35" y="38" fill="#17202a" font-family="system-ui, sans-serif" font-size="27" font-weight="750">Sequenz 2 · Wechsel in die Nahdistanz</text>
