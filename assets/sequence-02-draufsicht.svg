  </g>
    <g id="sequence-2-phase-1-movement" class="movement"><path class="motion-gray" d="M 305 320 L 267 320"/><text class="move-label" x="567" y="152" text-anchor="end">diagonal links</text></g><g id="sequence-2-phase-1-action-1" class="action action-punch"><path class="active-red" d="M 283 202 L 267 287"/><path class="motion-red" d="M 283 202 L 267 287"/></g><g id="sequence-2-phase-1-action-2" class="action action-block"><path class="active-blue" d="M 245 315 Q 267 290 262 265"/></g><text class="caption" x="45" y="401">Eolgul Jireugi R · links diagonal · Eolgul Bakkat Makki L</text>
  </g>
